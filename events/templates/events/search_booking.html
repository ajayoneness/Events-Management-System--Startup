{% extends 'events/base.html' %}

{% block title %}Search Booking{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card">
            <div class="card-body py-5">
                <div class="text-center mb-4">
                    <i class="fas fa-search fa-4x text-primary mb-3"></i>
                    <h2 class="fw-bold">Find Your Booking</h2>
                    <p class="text-muted">Enter your email to view your bookings</p>
                </div>
                
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="your.email@example.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Booking ID (Optional)</label>
                        <input type="text" name="booking_id" class="form-control" placeholder="Enter booking ID if known">
                        <small class="text-muted">Leave blank to see all bookings for your email</small>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 py-3">
                        <i class="fas fa-search"></i> Search Bookings
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="{% url 'event_list' %}" class="btn btn-outline-primary">
                        <i class="fas fa-arrow-left"></i> Back to Events
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
